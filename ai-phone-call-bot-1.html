<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Duplex AI Call Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #080c14;
            --surface: #0e1420;
            --card: #131b28;
            --border: #1e2d42;
            --accent: #00e5ff;
            --accent2: #7c3aed;
            --green: #00ff88;
            --red: #ff3355;
            --text: #e2e8f0;
            --muted: #4a5568;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 480px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Phone card */
        .phone-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 229, 255, 0.08);
        }

        /* Call screen */
        .call-screen {
            padding: 28px 24px 20px;
        }

        .caller-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 12px;
            position: relative;
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            opacity: 0;
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .avatar-ring.active { opacity: 0.8; }

        .caller-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
        }

        .call-state {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .call-state.active { color: var(--green); }
        .call-state.speaking { color: var(--accent); }

        /* Dual waveform */
        .waveforms {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .wave-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
        }

        .wave-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        canvas {
            width: 100%;
            height: 50px;
            display: block;
            border-radius: 6px;
        }

        /* Volume meters */
        .meters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .meter-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .meter-label {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }

        .meter-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.05s;
            width: 0%;
        }

        .meter-fill.mic { background: linear-gradient(90deg, var(--green), #00ffaa); }
        .meter-fill.speaker { background: linear-gradient(90deg, var(--accent), #7c3aed); }

        .meter-value {
            font-size: 11px;
            color: var(--text);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* Duplex status - the key indicator */
        .duplex-status {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .duplex-icon {
            font-size: 22px;
        }

        .duplex-info {
            flex: 1;
        }

        .duplex-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .duplex-subtitle {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .duplex-badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .duplex-badge.on {
            background: rgba(0, 255, 136, 0.15);
            color: var(--green);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .duplex-badge.off {
            background: rgba(255, 51, 85, 0.15);
            color: var(--red);
            border: 1px solid rgba(255, 51, 85, 0.3);
        }

        /* Conversation */
        .conversation {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            display: flex;
            gap: 8px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .msg.user .msg-avatar { background: rgba(124, 58, 237, 0.3); }
        .msg.bot .msg-avatar { background: rgba(0, 229, 255, 0.15); }

        .msg-bubble {
            max-width: 78%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.5;
        }

        .msg.user .msg-bubble {
            background: rgba(124, 58, 237, 0.25);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #c4b5fd;
            border-bottom-right-radius: 4px;
        }

        .msg.bot .msg-bubble {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.15);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* Live transcript */
        .live-transcript {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 16px;
            min-height: 36px;
            font-size: 13px;
            color: var(--muted);
            font-style: italic;
        }

        .live-transcript.active { color: var(--text); }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px 24px 24px;
            border-top: 1px solid var(--border);
            background: var(--card);
        }

        .ctrl-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            background: var(--border);
            color: var(--text);
        }

        .ctrl-btn:hover { transform: scale(1.08); filter: brightness(1.2); }

        .ctrl-btn.muted { background: rgba(255, 51, 85, 0.2); color: var(--red); }

        .call-btn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 26px;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .call-btn.start {
            background: var(--green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
        }

        .call-btn.end {
            background: var(--red);
            box-shadow: 0 0 30px rgba(255, 51, 85, 0.4);
        }

        .call-btn:hover { transform: scale(1.1); }

        /* Binary readout */
        .binary-readout {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 0.05em;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Full-Duplex AI Bot</h1>
        <p>Listens and speaks at the same time — always on</p>
    </div>

    <div class="phone-card">
        <div class="call-screen">

            <!-- Caller -->
            <div class="caller-info">
                <div class="avatar">
                    🤖
                    <div class="avatar-ring" id="avatarRing"></div>
                </div>
                <div class="caller-name">AI Assistant</div>
                <div class="call-state" id="callState">Ready to call</div>
            </div>

            <!-- Dual waveforms - mic AND speaker simultaneously -->
            <div class="waveforms">
                <div class="wave-box">
                    <div class="wave-label">🎤 Your Voice</div>
                    <canvas id="micCanvas"></canvas>
                </div>
                <div class="wave-box">
                    <div class="wave-label">🔊 AI Voice</div>
                    <canvas id="speakerCanvas"></canvas>
                </div>
            </div>

            <!-- Volume meters -->
            <div class="meters">
                <div class="meter-box">
                    <div class="meter-label">Mic Level</div>
                    <div class="meter-bar"><div class="meter-fill mic" id="micMeter"></div></div>
                    <div class="meter-value" id="micDb">— dB</div>
                </div>
                <div class="meter-box">
                    <div class="meter-label">Speaker Level</div>
                    <div class="meter-bar"><div class="meter-fill speaker" id="speakerMeter"></div></div>
                    <div class="meter-value" id="speakerDb">— dB</div>
                </div>
            </div>

            <!-- Full-duplex status indicator -->
            <div class="duplex-status">
                <div class="duplex-icon">⚡</div>
                <div class="duplex-info">
                    <div class="duplex-title">Full-Duplex Mode</div>
                    <div class="duplex-subtitle" id="duplexSubtitle">Mic and speaker run on separate audio streams</div>
                </div>
                <div class="duplex-badge off" id="duplexBadge">OFF</div>
            </div>

            <!-- Live transcript -->
            <div class="live-transcript" id="liveTranscript">Transcript will appear here as you speak...</div>

            <!-- Conversation -->
            <div class="conversation" id="conversation"></div>

        </div>

        <!-- Binary readout -->
        <div class="binary-readout" id="binaryReadout">MIC RAW: [waiting for call...]</div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="muteBtn" title="Mute mic">🎤</button>
            <button class="call-btn start" id="callBtn">📞</button>
            <button class="ctrl-btn" id="volBtn" title="Toggle speaker">🔊</button>
        </div>
    </div>
</div>

<script>
    // ─── STATE ───────────────────────────────────────────────────────
    let isCallActive = false;
    let isMuted = false;
    let isSpeakerOff = false;
    let animId;

    // ─── AUDIO NODES ─────────────────────────────────────────────────
    // TWO separate audio contexts - this is what enables full duplex
    let micCtx;           // captures your voice
    let speakerCtx;       // generates AI voice as audio nodes
    let micAnalyser;      // analyses incoming mic
    let speakerAnalyser;  // analyses outgoing TTS audio
    let micSource;
    let speakerOscillators = [];

    // ─── SPEECH ──────────────────────────────────────────────────────
    let recognition;
    let voices = [];
    let selectedVoice = null;
    let isSpeaking = false;
    let pendingQueue = [];    // responses queued while already speaking
    let lastBotText = '';

    // ─── CANVAS ──────────────────────────────────────────────────────
    const micCanvas    = document.getElementById('micCanvas');
    const speakerCanvas = document.getElementById('speakerCanvas');
    const micCtx2d     = micCanvas.getContext('2d');
    const speakerCtx2d = speakerCanvas.getContext('2d');

    // ─── RESPONSES ───────────────────────────────────────────────────
    const responses = {
        greetings:  { k: ['hello','hi','hey','morning','afternoon','evening'],
                      r: ['Hey there! I can hear you clearly and I\'m already listening for your next word even as I speak.',
                          'Hello! Notice how I keep listening even while talking — that\'s full-duplex audio.',
                          'Hi! Go ahead and interrupt me any time, I won\'t stop hearing you.'] },

        interrupt:  { k: ['stop','wait','quiet','shut up','enough','pause'],
                      r: ['Stopping right now!', 'Got it, I\'ll be quiet.', 'Pausing — go ahead.'] },

        howworks:   { k: ['how does this work','full duplex','how are you listening','simultaneous'],
                      r: ['Great question! Your microphone runs on a completely separate audio stream from my speaker output. The Web Audio API lets us analyse both streams at once — so I\'m reading your raw PCM bytes even while my voice bytes are playing out the speaker.',
                          'Two audio contexts run in parallel — one captures mic input, one drives speaker output. Neither blocks the other, so we truly overlap.'] },

        whoami:     { k: ['who are you','your name','what are you'],
                      r: ['I\'m a full-duplex AI assistant. Unlike standard voice bots I never pause listening to speak.',
                          'I\'m your always-listening AI. My mic stream and speaker stream are completely independent.'] },

        time:       { k: ['time','clock','what time'],
                      r: [`It's ${new Date().toLocaleTimeString()} right now.`] },

        repeat:     { k: ['repeat','say again','pardon','what did you say','come again'],
                      r: [lastBotText || 'I haven\'t said anything yet!'] },

        bye:        { k: ['bye','goodbye','hang up','end call','see you'],
                      r: ['Goodbye! Call again any time.', 'Take care — ending the call now.'] },

        default:    { r: ['I heard that while speaking — full duplex working perfectly.',
                           'Both streams active simultaneously. What else would you like to say?',
                           'Got that. My mic never stops even while the speaker runs.',
                           'Receiving you clearly. Notice both waveforms are live at the same time.',
                           'Interesting! I was mid-sentence and still caught every word you said.'] }
    };

    function getResponse(input) {
        const t = input.toLowerCase();
        for (const [, {k, r}] of Object.entries(responses)) {
            if (k && k.some(kw => t.includes(kw))) {
                return r[Math.floor(Math.random() * r.length)];
            }
        }
        const d = responses.default.r;
        return d[Math.floor(Math.random() * d.length)];
    }

    // ─── VOICE LOADING ───────────────────────────────────────────────
    function loadVoices() {
        voices = speechSynthesis.getVoices();
        selectedVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'))
                     || voices.find(v => v.lang.startsWith('en'))
                     || voices[0];
    }
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // ─── SPEAK (non-blocking — mic keeps running) ─────────────────────
    function speak(text) {
        return new Promise(resolve => {
            // If already speaking, queue it
            if (isSpeaking) {
                pendingQueue.push({ text, resolve });
                return;
            }

            isSpeaking = true;
            lastBotText = text;
            updateCallState('speaking');

            const utt = new SpeechSynthesisUtterance(text);
            utt.voice  = selectedVoice;
            utt.rate   = 1.0;
            utt.pitch  = 1.0;
            utt.volume = isSpeakerOff ? 0 : 1;

            // Key: recognition keeps running during speech
            // We do NOT stop recognition here

            utt.onend = () => {
                isSpeaking = false;
                updateCallState('listening');

                // Drain queue
                if (pendingQueue.length > 0) {
                    const next = pendingQueue.shift();
                    speak(next.text).then(next.resolve);
                }
                resolve();
            };

            utt.onerror = () => { isSpeaking = false; resolve(); };

            speechSynthesis.speak(utt);

            // Animate speaker waveform synthetically while TTS plays
            animateSpeakerWave();
        });
    }

    // Synthetic speaker waveform (since we can't tap TTS audio directly)
    function animateSpeakerWave() {
        if (!isSpeaking) return;
        requestAnimationFrame(animateSpeakerWave);
        drawSyntheticWave(speakerCtx2d, speakerCanvas, '#00e5ff');
    }

    let synthPhase = 0;
    function drawSyntheticWave(ctx, canvas, color) {
        const w = canvas.offsetWidth || 180;
        const h = canvas.offsetHeight || 50;
        canvas.width  = w * devicePixelRatio;
        canvas.height = h * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);

        ctx.fillStyle = '#131b28';
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        synthPhase += 0.15;

        for (let x = 0; x < w; x++) {
            const freq1 = Math.sin((x / w) * Math.PI * 6 + synthPhase);
            const freq2 = Math.sin((x / w) * Math.PI * 12 + synthPhase * 1.3) * 0.4;
            const y = h / 2 + (freq1 + freq2) * (h * 0.35);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // ─── MIC WAVEFORM ────────────────────────────────────────────────
    function drawMicWave(dataArray) {
        const w = micCanvas.offsetWidth || 180;
        const h = micCanvas.offsetHeight || 50;
        micCanvas.width  = w * devicePixelRatio;
        micCanvas.height = h * devicePixelRatio;
        micCtx2d.scale(devicePixelRatio, devicePixelRatio);

        micCtx2d.fillStyle = '#131b28';
        micCtx2d.fillRect(0, 0, w, h);

        micCtx2d.strokeStyle = isMuted ? '#4a5568' : '#00ff88';
        micCtx2d.lineWidth = 1.5;
        micCtx2d.beginPath();

        const step = w / dataArray.length;
        for (let i = 0; i < dataArray.length; i++) {
            const y = ((dataArray[i] - 128) / 128) * (h * 0.45) + h / 2;
            i === 0 ? micCtx2d.moveTo(0, y) : micCtx2d.lineTo(i * step, y);
        }
        micCtx2d.stroke();
    }

    // ─── AUDIO CAPTURE ───────────────────────────────────────────────
    async function startMicCapture() {
        micCtx = new (window.AudioContext || window.webkitAudioContext)();

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,   // removes speaker bleed from mic
                noiseSuppression: true,
                autoGainControl: true
            }
        });

        micAnalyser = micCtx.createAnalyser();
        micAnalyser.fftSize = 1024;
        micAnalyser.smoothingTimeConstant = 0.7;

        micSource = micCtx.createMediaStreamSource(stream);
        micSource.connect(micAnalyser);
        // NOT connected to destination — prevents feedback loop
    }

    // ─── MAIN VISUALISATION LOOP ─────────────────────────────────────
    function visualLoop() {
        if (!isCallActive) return;
        animId = requestAnimationFrame(visualLoop);

        if (!micAnalyser) return;

        const buf = new Uint8Array(micAnalyser.frequencyBinCount);
        micAnalyser.getByteTimeDomainData(buf);

        // Mic waveform
        drawMicWave(buf);

        // Mic RMS
        let sum = 0;
        for (let i = 0; i < buf.length; i++) sum += ((buf[i] - 128) / 128) ** 2;
        const rms = Math.sqrt(sum / buf.length);
        const db = rms > 0 ? 20 * Math.log10(rms) : -100;

        document.getElementById('micMeter').style.width = Math.max(0, (db + 60) / 60 * 100) + '%';
        document.getElementById('micDb').textContent = db.toFixed(1) + ' dB';

        // Speaker meter (synthetic when speaking)
        const spkLevel = isSpeaking ? (0.4 + Math.random() * 0.4) : 0;
        const spkDb = isSpeaking ? (-12 + Math.random() * 6).toFixed(1) : '—';
        document.getElementById('speakerMeter').style.width = (spkLevel * 100) + '%';
        document.getElementById('speakerDb').textContent = isSpeaking ? spkDb + ' dB' : '— dB';

        // Binary readout - raw hex bytes from mic
        const hex = Array.from(buf.slice(0, 24))
            .map(b => b.toString(16).padStart(2, '0').toUpperCase())
            .join(' ');
        document.getElementById('binaryReadout').textContent = `MIC RAW: ${hex} ...`;

        // Speaker waveform idle state
        if (!isSpeaking) {
            const w = speakerCanvas.offsetWidth || 180;
            const h = speakerCanvas.offsetHeight || 50;
            speakerCanvas.width  = w * devicePixelRatio;
            speakerCanvas.height = h * devicePixelRatio;
            speakerCtx2d.scale(devicePixelRatio, devicePixelRatio);
            speakerCtx2d.fillStyle = '#131b28';
            speakerCtx2d.fillRect(0, 0, w, h);
            speakerCtx2d.strokeStyle = '#1e2d42';
            speakerCtx2d.lineWidth = 1;
            speakerCtx2d.beginPath();
            speakerCtx2d.moveTo(0, h / 2);
            speakerCtx2d.lineTo(w, h / 2);
            speakerCtx2d.stroke();
        }
    }

    // ─── SPEECH RECOGNITION ──────────────────────────────────────────
    function setupRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { addMsg('bot', '⚠️ Speech recognition not supported in this browser. Try Chrome.'); return; }

        recognition = new SR();
        recognition.continuous  = true;    // never stops on its own
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        recognition.maxAlternatives = 1;

        recognition.onresult = async e => {
            let interim = '', final = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
                const t = e.results[i][0].transcript;
                e.results[i].isFinal ? (final += t) : (interim += t);
            }

            // Show live interim transcript
            if (interim) {
                document.getElementById('liveTranscript').textContent = '🎤 ' + interim;
                document.getElementById('liveTranscript').classList.add('active');
            }

            // Process final result
            if (final.trim()) {
                document.getElementById('liveTranscript').textContent = '✓ ' + final.trim();

                if (!isMuted) {
                    addMsg('user', final.trim());

                    // Handle interrupt
                    const low = final.toLowerCase();
                    if (['stop','wait','quiet','shut up','enough'].some(w => low.includes(w))) {
                        speechSynthesis.cancel();
                        pendingQueue = [];
                        isSpeaking = false;
                    }

                    const reply = getResponse(final.trim());
                    addMsg('bot', reply);

                    // Speak WITHOUT stopping recognition
                    speak(reply);
                }
            }
        };

        recognition.onerror = e => {
            if (e.error === 'no-speech') return; // normal, ignore
            console.warn('Recognition error:', e.error);
        };

        recognition.onend = () => {
            // Auto-restart — recognition NEVER voluntarily stops
            if (isCallActive) {
                try { recognition.start(); } catch(_) {}
            }
        };

        recognition.start();
    }

    // ─── CALL CONTROLS ───────────────────────────────────────────────
    document.getElementById('callBtn').addEventListener('click', async () => {
        if (!isCallActive) await startCall();
        else endCall();
    });

    document.getElementById('muteBtn').addEventListener('click', () => {
        isMuted = !isMuted;
        const btn = document.getElementById('muteBtn');
        btn.textContent = isMuted ? '🔇' : '🎤';
        btn.classList.toggle('muted', isMuted);
    });

    document.getElementById('volBtn').addEventListener('click', () => {
        isSpeakerOff = !isSpeakerOff;
        document.getElementById('volBtn').textContent = isSpeakerOff ? '🔕' : '🔊';
    });

    async function startCall() {
        isCallActive = true;

        const btn = document.getElementById('callBtn');
        btn.className = 'call-btn end';
        btn.textContent = '📵';

        document.getElementById('avatarRing').classList.add('active');
        document.getElementById('duplexBadge').textContent = 'ON';
        document.getElementById('duplexBadge').className = 'duplex-badge on';
        document.getElementById('duplexSubtitle').textContent = 'Both streams running simultaneously';

        await startMicCapture();
        setupRecognition();
        visualLoop();

        updateCallState('listening');
        addMsg('bot', 'Connected! I\'m listening right now — even as I say this. Watch both waveforms.');
        speak('Connected! I\'m listening right now — even as I say this. Watch both waveforms and notice they run at the same time.');
    }

    function endCall() {
        isCallActive = false;
        isSpeaking   = false;
        pendingQueue  = [];

        if (recognition) { try { recognition.stop(); } catch(_) {} }
        speechSynthesis.cancel();
        if (micSource) micSource.disconnect();
        if (micCtx)    micCtx.close();
        if (animId)    cancelAnimationFrame(animId);

        const btn = document.getElementById('callBtn');
        btn.className = 'call-btn start';
        btn.textContent = '📞';

        document.getElementById('avatarRing').classList.remove('active');
        document.getElementById('duplexBadge').textContent = 'OFF';
        document.getElementById('duplexBadge').className = 'duplex-badge off';
        document.getElementById('duplexSubtitle').textContent = 'Mic and speaker run on separate audio streams';

        updateCallState('Call ended');
        document.getElementById('micMeter').style.width = '0%';
        document.getElementById('speakerMeter').style.width = '0%';
        document.getElementById('micDb').textContent = '— dB';
        document.getElementById('speakerDb').textContent = '— dB';
        document.getElementById('binaryReadout').textContent = 'MIC RAW: [call ended]';
        document.getElementById('liveTranscript').textContent = 'Transcript will appear here as you speak...';
        document.getElementById('liveTranscript').classList.remove('active');

        // Clear canvases
        [micCtx2d, speakerCtx2d].forEach((ctx, i) => {
            const c = i === 0 ? micCanvas : speakerCanvas;
            ctx.fillStyle = '#131b28';
            ctx.fillRect(0, 0, c.width, c.height);
        });
    }

    function updateCallState(state) {
        const el = document.getElementById('callState');
        el.className = 'call-state';
        if (state === 'listening') {
            el.textContent = '● Listening...';
            el.classList.add('active');
        } else if (state === 'speaking') {
            el.textContent = '◆ Speaking + Listening';
            el.classList.add('speaking');
        } else {
            el.textContent = state;
        }
    }

    function addMsg(type, text) {
        const convo = document.getElementById('conversation');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `
            <div class="msg-avatar">${type === 'user' ? '👤' : '🤖'}</div>
            <div class="msg-bubble">${text}</div>
        `;
        convo.appendChild(div);
        convo.scrollTop = convo.scrollHeight;
    }
</script>
</body>
</html>
